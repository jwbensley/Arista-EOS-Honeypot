enable

! The following two lines are needed for eAPI access
security pki key generate rsa 2048 eapiServer.key
security pki certificate generate self-signed eapiServer.cert key eapiServer.key validity 365 parameters common-name self-signed

configure

no aaa root
!
username admin privilege 15 secret 0 admin
!
schedule tech-support interval 60 timeout 30 max-log-files 100 command show tech-support all
!
no ip igmp snooping
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
agent PowerManager shutdown
agent LedPolicy shutdown
agent Thermostat shutdown
agent PowerFuse shutdown
agent StandbyCpld shutdown
agent LicenseManager shutdown
!
logging event login root
logging buffered 1000000
logging console debugging
logging monitor debugging
logging synchronous level debugging
logging format timestamp traditional year timezone
logging format hostname fqdn
logging format sequence-numbers
logging persistent 1000000
!
hostname arista_eos
ip name-server vrf default 1.1.1.1
ip name-server vrf default 8.8.8.8
!
spanning-tree mode none
!
system l1
   unsupported speed action error
   unsupported error-correction action error
   exit
!
vrf instance management
!
banner login
Arista EOS 4.31.2F
This is a private system. Unauthorized access is prohibited.
EOF
banner motd
Arista EOS 4.31.2F
This is a private system. Unauthorized access is prohibited.
EOF
!
management api http-commands
   no shutdown
   !
   vrf management
      no shutdown
      exit
   exit
!
management http-server
   protocol https ssl profile eapi
   exit
!
management security
   ssl profile eapi
      certificate eapiServer.cert key eapiServer.key
      exit
   exit
!
! The following two lines are needed for SCP to work:
aaa authentication login console local
aaa authorization exec default local
aaa accounting exec console start-stop logging
aaa accounting commands all console start-stop logging
aaa accounting exec default start-stop logging
aaa accounting system default start-stop logging
aaa accounting commands all default start-stop logging
!
interface Ethernet1
   description WAN Uplink 10Mbps
   no switchport
   ip address 10.214.33.2/24
   ipv6 enable
   ipv6 address fd:10:214:33::2/64
   no lldp transmit
   no lldp receive
   no mpls ip
   exit
!
interface Ethernet2
   description Server DMZ
   no switchport
   ip address 10.214.34.2/24
   ipv6 enable
   ipv6 address fd:10:214:34::2/64
   no lldp transmit
   no lldp receive
   no mpls ip
   exit
!
interface Management0
   vrf management
   ip address 10.47.218.2/24
   ipv6 enable
   ipv6 address fd:10:47:218::2/64
   exit
!
ip routing
ip routing vrf management
!
ipv6 unicast-routing
ipv6 unicast-routing vrf management
!
ip route 0.0.0.0/0 10.214.33.1 name Default-Via-ISP
ip route 10.0.0.0/8 10.214.34.1 name Server-DMZ
ip route vrf management 0.0.0.0/0 10.47.218.1 name OOB-Access
!
ipv6 route ::/0 fd:10:214:33::1 name Default-Via-ISP
ipv6 route fc00::/7 fd:10:214:34::1 name Server-DMZ
ipv6 route vrf management ::/0 fd:10:47:218::1 name OOB-Access
!
ntp server 0.europe.pool.ntp.org local-interface Ethernet1
ntp server 1.europe.pool.ntp.org local-interface Ethernet1
!
management ssh
   vrf default
      no shutdown
      exit
   !
   vrf management
      no shutdown
      exit
   exit
!
management telnet
   vrf default
      no shutdown
      exit
   vrf management
      no shutdown
      exit
   exit

wr
